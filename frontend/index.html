<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selettore Preferenze Podcast</title>
</head>

<body>
    <div class="container">
        <h1>Seleziona le tue preferenze</h1>
        <p class="subtitle">Clicca sui tag per selezionare i tuoi interessi</p>

        <div class="category">
            <h2 class="category-title">Tematiche</h2>
            <div class="tags-grid" id="tematiche">
                <div class="tag" data-category="tematiche" data-value="intrattenimento">Intrattenimento</div>
                <div class="tag" data-category="tematiche" data-value="cultura">Cultura</div>
                <div class="tag" data-category="tematiche" data-value="interviste">Interviste</div>
                <div class="tag" data-category="tematiche" data-value="attualita">Attualità</div>
                <div class="tag" data-category="tematiche" data-value="politica">Politica</div>
                <div class="tag" data-category="tematiche" data-value="satira">Satira</div>
                <div class="tag" data-category="tematiche" data-value="storie-vita">Storie di vita</div>
                <div class="tag" data-category="tematiche" data-value="cultura-pop">Cultura pop</div>
                <div class="tag" data-category="tematiche" data-value="umorismo">Umorismo</div>
                <div class="tag" data-category="tematiche" data-value="crime">Crime</div>
                <div class="tag" data-category="tematiche" data-value="mistero">Mistero</div>
                <div class="tag" data-category="tematiche" data-value="narrazione">Narrazione</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-submit" id="submitBtn">Conferma selezione</button>
            <button class="btn-reset" id="resetBtn">Azzera tutto</button>
        </div>

    <script src="script.js"></script>
</body>

</html>
