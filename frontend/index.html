<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="assets/logo/RECO.AI.ico">
    <title>RECO.AI - Scopri i podcast perfetti per te</title>

    <!-- Google Fonts: nuovo design system -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    
    <!-- Stili -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/style_index.css">
</head>
<body>

    <!-- Decorazioni orb di sfondo -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Header fisso -->
    <header>
        <a href="index.html">
            <span class='logo-text'>RECO.AI</span>
        </a>
        <span class="header-badge">HOME</span>
        
    </header>

    <!-- Hero -->
    <main>

        <h1>
            I podcast<br>
            <span>perfetti per te</span>
        </h1>

        <p class="hero-sub">
            Seleziona le tue passioni e lascia che l'algoritmo trovi i contenuti
            più adatti ai tuoi interessi.
        </p>

        <div class="cta-group">
            <!-- Classe btn-start mantenuta per compatibilità JS, btn-primary per lo stile -->
            <button class="btn-primary btn-start" id="btnStart">
                Inizia
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
