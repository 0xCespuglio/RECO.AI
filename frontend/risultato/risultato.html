<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../assets/logo/RECO.AI.ico">
    <title>RECO.AI • I tuoi podcast consigliati</title>

    <!-- Google Fonts: nuovo design system -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">



    <!-- Font Awesome (usato da script_risultato.js per le icone dinamiche) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stili -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/style_risultato.css">
</head>
<body>

    <!-- Decorazione orb di sfondo -->
    <div class="orb orb-1"></div>

    <!-- Header fisso -->
    <header>
        <a href="../index.html">
            <span class='logo-text'>RECO.AI</span>
        </a>
         <span class="header-badge">RISULTATO</span> 
        
    </header>

    <main>
        <!-- =============================================
             STATO DI CARICAMENTO
             JS usa: id="loading" per mostrare/nascondere
             ============================================= -->
        <div id="loading">
            <!-- Spinner in stile nuovo (il CSS nasconde .fa-spinner) -->
            <div class="loader-ring"></div>
            <h2>Caricamento dei podcast...</h2>
            <p>Stiamo analizzando le tue preferenze per trovare i podcast perfetti per te.</p>
        </div>

        <!-- =============================================
             STATO DI ERRORE
             JS usa: id="error", id="error-message"
             ============================================= -->
        <div id="error">
            <div style="font-size: 2.5rem; margin-bottom: 16px;">⚠️</div>
            <h2>Si è verificato un errore</h2>
            <p id="error-message"></p>
            <button onclick="location.reload()">
                <i class="fas fa-redo"></i> Riprova
            </button>
        </div>

        <!-- =============================================
             PAGE HEADER (visibile dopo il caricamento)
             ============================================= -->
        <div class="page-header" id="page-header" style="display: none;">
            <span class="page-label">I tuoi risultati</span>
            <h1>I podcast consigliati per te</h1>
            <p class="page-sub">Ordinati per affinità in base alle tue preferenze.</p>

        </div>

        <!-- =============================================
             CONTAINER RISULTATI
             JS usa: id="podcasts-container" per inserire le card
             ============================================= -->
        <div class="results-container" id="podcasts-container">
            
            <!-- Le podcast card vengono inserite dinamicamente da script_risultato.js -->
        </div>

        <!-- =============================================
             BOTTONE TORNA INDIETRO
             JS usa: onclick diretto (non modificare)
             DISATTIVATO
             ============================================= -->
        <div class="bottom-cta" id="bottom-cta" style="display:none;">
            <button class="btn-back" onclick="window.location.href='../preferenze/preferenze.html'">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Torna alla selezione
            </button>
        </div>
    </main>

    <!-- =============================================
         MODAL DETTAGLI PODCAST
         JS usa: id="modal", .modal, .modal.active,
         id="modalImage", id="modalTitle",
         id="modalCompatibility", id="modalDescription",
         id="modalTags", onclick="closeModal()"
         ============================================= -->
    <div class="modal" id="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-layout">
                <div class="modal-left">
                    <img id="modalImage" class="modal-image" src="" alt="">
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-compatibility" id="modalCompatibility"></div>
                </div>
                <div class="modal-right">
                    <div class="modal-section modal-section-description">
                        <h3><i class="fas fa-info-circle"></i> Descrizione</h3>
                        <p id="modalDescription"></p>
                    </div>
                    <div class="modal-section modal-section-tags">
                        <h3><i class="fas fa-tags"></i> Categorie in comune</h3>
                        <div class="modal-tags" id="modalTags"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script_risultato.js"></script>
</body>
</html>
