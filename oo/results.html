<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PodcastMatch • I tuoi consigli personalizzati</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>I tuoi podcast consigliati</h1>
            <p class="subtitle">Basati sulle tue preferenze e ordinati per affinità</p>
        </header>

        <div class="results-container" id="resultsContainer">
            <!-- I podcast verranno inseriti qui dinamicamente -->
        </div>

        <button class="btn-back" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
            Torna alla selezione
        </button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-header">
                <img id="modalImage" class="modal-image" src="" alt="">
                <h2 class="modal-title" id="modalTitle"></h2>
                <div class="modal-compatibility" id="modalCompatibility"></div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3><i class="fas fa-info-circle"></i> Di cosa tratta</h3>
                    <p id="modalDescription"></p>
                </div>
                <div class="modal-section">
                    <h3><i class="fas fa-tags"></i> Tematiche</h3>
                    <div class="modal-tags" id="modalTags"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="results.js"></script>
</body>

</html>
